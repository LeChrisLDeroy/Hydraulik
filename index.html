<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🛢️ Hydrauliköl - LS Drehmaschine</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d0d1a; color: #eaeaea; font-family: 'Segoe UI', Arial, sans-serif; min-height: 100vh; overflow-x: hidden; font-size: 22px; }

.bg-stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
.star { position: absolute; background: white; border-radius: 50%; animation: twinkle linear infinite; }
@keyframes twinkle { 0%, 100% { opacity: 0; transform: scale(0.5); } 50% { opacity: 1; transform: scale(1); } }

#game { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 15px; }

.game-header { text-align: center; padding: 25px 20px 20px; background: linear-gradient(135deg, rgba(15,52,96,0.9), rgba(22,33,62,0.9)); border: 1px solid rgba(232,160,0,0.3); border-bottom: 3px solid #e8a000; border-radius: 15px 15px 0 0; }

/* ===== INTRO / PASSWORT SCREEN ===== */
.pw-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px 20px;
  text-align: center;
}

.machine-icon-wrap {
  position: relative;
  margin: 20px auto;
  width: 160px;
  height: 160px;
}

.machine-svg {
  width: 160px;
  height: 160px;
  filter: drop-shadow(0 0 20px rgba(255,71,87,0.6));
  animation: machinePulse 1.5s ease-in-out infinite;
}

@keyframes machinePulse {
  0%, 100% { filter: drop-shadow(0 0 10px rgba(255,71,87,0.4)); }
  50% { filter: drop-shadow(0 0 30px rgba(255,71,87,0.9)); }
}

.lock-badge {
  position: absolute;
  top: -10px;
  right: -10px;
  font-size: 2.5em;
  animation: lockShake 3s ease-in-out infinite;
}

@keyframes lockShake {
  0%, 85%, 100% { transform: rotate(0deg); }
  88% { transform: rotate(-10deg); }
  92% { transform: rotate(10deg); }
  96% { transform: rotate(-6deg); }
}

.alarm-banner {
  background: linear-gradient(135deg, rgba(255,71,87,0.2), rgba(139,0,0,0.15));
  border: 2px solid #ff4757;
  border-radius: 12px;
  padding: 14px 20px;
  margin: 16px 0;
  animation: alarmBlink 1.2s ease-in-out infinite;
  width: 100%;
}

@keyframes alarmBlink {
  0%, 100% { border-color: #ff4757; box-shadow: 0 0 10px rgba(255,71,87,0.3); }
  50% { border-color: #ff8c00; box-shadow: 0 0 25px rgba(255,71,87,0.7); }
}

.alarm-title {
  color: #ff4757;
  font-weight: bold;
  font-size: 1.2em;
  letter-spacing: 2px;
}

.alarm-sub {
  color: #ffaa00;
  font-size: 0.9em;
  margin-top: 4px;
}

.pw-input-wrap {
  width: 100%;
  max-width: 380px;
  margin: 20px auto;
}

.pw-label {
  color: #aaa;
  font-size: 0.9em;
  margin-bottom: 8px;
  display: block;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.pw-input {
  width: 100%;
  background: rgba(15,52,96,0.8);
  border: 2px solid rgba(74,144,217,0.6);
  border-radius: 10px;
  color: #fff;
  padding: 14px 18px;
  font-size: 1.4em;
  text-align: center;
  letter-spacing: 6px;
  font-family: monospace;
  transition: all 0.2s ease;
  outline: none;
}

.pw-input:focus {
  border-color: #e8a000;
  box-shadow: 0 0 20px rgba(232,160,0,0.3);
}

.pw-input.wrong {
  border-color: #ff4757;
  animation: shakeInput 0.4s ease;
  box-shadow: 0 0 20px rgba(255,71,87,0.4);
}

@keyframes shakeInput {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-12px); }
  40% { transform: translateX(12px); }
  60% { transform: translateX(-8px); }
  80% { transform: translateX(8px); }
}

.pw-error {
  color: #ff4757;
  font-size: 0.9em;
  margin-top: 8px;
  min-height: 24px;
}

/* ===== REGELSCREEN ===== */
.regeln-box {
  background: linear-gradient(135deg, rgba(15,52,96,0.7), rgba(22,33,62,0.7));
  border: 2px solid rgba(232,160,0,0.5);
  border-radius: 14px;
  padding: 20px 24px;
  margin: 16px 0;
}
.regel-item {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 12px 0;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  line-height: 1.5;
}
.regel-item:last-child { border-bottom: none; }
.regel-icon { font-size: 1.5em; flex-shrink: 0; margin-top: 2px; }
.regel-text strong { color: #e8a000; display: block; margin-bottom: 3px; }
.regel-text span { color: #ccc; font-size: 0.92em; }
.checkbox-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(46,213,115,0.08);
  border: 1px solid rgba(46,213,115,0.3);
  border-radius: 10px;
  padding: 14px 18px;
  margin-top: 16px;
  cursor: pointer;
}
.checkbox-wrap input[type=checkbox] {
  width: 22px;
  height: 22px;
  accent-color: #2ed573;
  cursor: pointer;
  flex-shrink: 0;
  margin: 0;
}
.checkbox-wrap label { color: #ccc; cursor: pointer; font-size: 1em; }
.intro-scene {
  padding: 10px 0;
}

.typing-box {
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(74,144,217,0.3);
  border-radius: 12px;
  padding: 24px;
  margin: 16px 0;
  font-family: 'Courier New', monospace;
  font-size: 1.05em;
  line-height: 1.9;
  min-height: 180px;
}

.typing-cursor {
  display: inline-block;
  width: 2px;
  height: 1.1em;
  background: #e8a000;
  vertical-align: middle;
  animation: blink 0.7s step-end infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

.ts { color: #4a90d9; font-size: 0.85em; }
.ts-line { margin-bottom: 8px; }
.highlight-red { color: #ff4757; font-weight: bold; }
.highlight-yellow { color: #e8a000; font-weight: bold; }
.highlight-green { color: #2ed573; font-weight: bold; }
.game-header h1 { color: #e8a000; font-size: 1.8em; animation: glow 2s ease-in-out infinite alternate; }
@keyframes glow { from { text-shadow: 0 0 10px rgba(232,160,0,0.3); } to { text-shadow: 0 0 25px rgba(232,160,0,0.8); } }
.game-header p { color: #aaa; font-size: 0.85em; margin-top: 5px; }

#content-area { background: linear-gradient(180deg, rgba(22,33,62,0.97) 0%, rgba(13,13,26,0.97) 100%); border: 1px solid rgba(74,144,217,0.3); border-top: none; border-radius: 0 0 15px 15px; padding: 25px; min-height: 400px; }
#content-area p, #content-area li { line-height: 1.6; }

/* MEISTER */
.meister-scene { display: flex; align-items: flex-end; gap: 15px; margin-bottom: 18px; }
.meister-img { width: 110px; flex-shrink: 0; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); animation: float 3s ease-in-out infinite; transition: all 0.4s ease; }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
.meister-img.bounce { animation: bounce 0.5s ease; }
@keyframes bounce { 0%,100% { transform: translateY(0) scale(1); } 30% { transform: translateY(-18px) scale(1.05); } 60% { transform: translateY(-4px) scale(0.98); } }
.meister-img.shake { animation: shake 0.5s ease; }
@keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-8px); } 40% { transform: translateX(8px); } 60% { transform: translateX(-6px); } 80% { transform: translateX(6px); } }
.sprechblase { background: rgba(15,52,96,0.9); border: 2px solid #4a90d9; border-radius: 15px 15px 15px 0; padding: 13px 15px; flex: 1; position: relative; animation: fadeInRight 0.4s ease; }
.sprechblase::before { content:''; position:absolute; left:-12px; bottom:20px; width:0; height:0; border-top:8px solid transparent; border-bottom:8px solid transparent; border-right:12px solid #4a90d9; }
.meister-name { color: #e8a000; font-weight: bold; font-size: 0.95em; margin-bottom: 5px; }

@keyframes fadeInRight { from { opacity:0; transform:translateX(15px); } to { opacity:1; transform:translateX(0); } }
@keyframes fadeInUp { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }
@keyframes scaleIn { from { opacity:0; transform:scale(0.85); } to { opacity:1; transform:scale(1); } }

.content-box { animation: fadeInUp 0.35s ease; }
h1.titel { color: #e8a000; font-size: 1.7em; border-bottom: 2px solid rgba(232,160,0,0.4); padding-bottom: 8px; margin-bottom: 15px; }
h2.untertitel { color: #4a90d9; font-size: 1.3em; margin-bottom: 15px; }

.btn { display: block; background: linear-gradient(135deg, #16213e, #0f3460); color: #eaeaea; padding: 13px 16px; margin: 7px 0; border-radius: 10px; border: 1px solid #4a90d9; cursor: pointer; font-size: 1.02em; transition: all 0.22s ease; text-align: left; width: 100%; position: relative; overflow: hidden; }
.btn:hover { background: linear-gradient(135deg, #0f3460, #1a4a80); border-color: #e8a000; color: #fff; transform: translateX(5px); box-shadow: 0 4px 15px rgba(74,144,217,0.25); }
.btn:active { transform: scale(0.98); }
.btn-start { background: linear-gradient(135deg, #e8a000, #c47800); border-color: #e8a000; color: #000; font-weight: bold; font-size: 1.1em; text-align: center; padding: 15px; border-radius: 12px; box-shadow: 0 4px 20px rgba(232,160,0,0.35); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100% { box-shadow: 0 4px 20px rgba(232,160,0,0.35); } 50% { box-shadow: 0 4px 35px rgba(232,160,0,0.7); } }
.btn-start:hover { background: linear-gradient(135deg, #ffb800, #e8a000); transform: scale(1.02); color: #000; }
.btn-gruen { background: linear-gradient(135deg, #1faa5a, #178a47); border-color: #2ed573; color: #fff; font-weight: bold; text-align: center; }
.btn-gruen:hover { background: linear-gradient(135deg, #2ed573, #1faa5a); color: #000; }

.richtig { background: linear-gradient(135deg, rgba(46,213,115,0.12), rgba(46,213,115,0.05)); border: 2px solid #2ed573; border-radius: 12px; padding: 15px; margin: 12px 0; animation: scaleIn 0.3s ease; box-shadow: 0 0 20px rgba(46,213,115,0.15); }
.falsch { background: linear-gradient(135deg, rgba(255,71,87,0.12), rgba(255,71,87,0.05)); border: 2px solid #ff4757; border-radius: 12px; padding: 15px; margin: 12px 0; animation: scaleIn 0.3s ease; box-shadow: 0 0 20px rgba(255,71,87,0.15); }
.hinweis { background: linear-gradient(135deg, rgba(232,160,0,0.1), rgba(232,160,0,0.05)); border: 2px solid #e8a000; border-radius: 12px; padding: 13px 15px; margin: 12px 0; }
.info-box { background: rgba(74,144,217,0.08); border: 1px solid rgba(74,144,217,0.3); border-radius: 10px; padding: 13px 15px; margin: 12px 0; font-size: 1em; line-height: 1.7; }
.unfall-box { background: linear-gradient(135deg, rgba(255,71,87,0.15), rgba(139,0,0,0.1)); border: 2px solid #ff4757; border-radius: 12px; padding: 15px; margin: 12px 0; }

.fortschritt { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 13px 16px; margin-bottom: 18px; }
.progress-items { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 8px; }
.progress-item { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 6px 14px; font-size: 1em; transition: all 0.3s; }
.progress-item.done { background: rgba(46,213,115,0.15); border-color: #2ed573; color: #2ed573; }

.station-btn { display: flex; align-items: center; gap: 12px; background: linear-gradient(135deg, rgba(22,33,62,0.8), rgba(15,48,96,0.8)); border: 1px solid rgba(74,144,217,0.4); border-radius: 12px; padding: 14px 16px; margin: 9px 0; cursor: pointer; transition: all 0.22s; width: 100%; text-align: left; color: #eaeaea; }
.station-btn:hover { border-color: #e8a000; transform: translateX(5px); box-shadow: 0 4px 18px rgba(232,160,0,0.18); }
.station-icon { font-size: 1.7em; flex-shrink: 0; }
.station-title { font-weight: bold; font-size: 1.05em; }
.station-sub { color: #aaa; font-size: 0.88em; margin-top: 2px; }

textarea, input[type=text] { width: 100%; background: rgba(15,52,96,0.6); border: 1px solid rgba(74,144,217,0.5); border-radius: 8px; color: #eaeaea; padding: 11px 13px; font-family: 'Segoe UI', Arial, sans-serif; font-size: 1em; margin: 6px 0; transition: border-color 0.2s; resize: vertical; }
textarea:focus, input[type=text]:focus { outline: none; border-color: #e8a000; box-shadow: 0 0 10px rgba(232,160,0,0.2); }
textarea { min-height: 75px; }
.eingabe-label { color: #ccc; font-size: 0.95em; margin-top: 10px; margin-bottom: 2px; display: block; }

.hlp-badge { text-align: center; background: linear-gradient(135deg, #0f3460, #16213e); border: 2px solid #e8a000; border-radius: 12px; padding: 18px; margin: 12px 0; font-size: 2.2em; font-weight: bold; color: #e8a000; letter-spacing: 7px; text-shadow: 0 0 20px rgba(232,160,0,0.4); }
.schema-box { background: linear-gradient(135deg, #0f3460, #0a1628); border: 1px solid rgba(74,144,217,0.4); border-radius: 12px; padding: 18px; margin: 12px 0; font-family: monospace; font-size: 0.82em; line-height: 2; white-space: pre; overflow-x: auto; text-align: center; color: #4a90d9; }
.diagram-box { background: linear-gradient(135deg, #0f3460, #0a1628); border: 1px solid rgba(74,144,217,0.4); border-radius: 12px; padding: 18px; margin: 12px 0; font-family: monospace; font-size: 0.8em; line-height: 1.9; white-space: pre; }

.score-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.04); border-radius: 8px; padding: 7px 14px; margin-bottom: 12px; font-size: 0.83em; color: #aaa; border: 1px solid rgba(255,255,255,0.07); }
.score-val { color: #e8a000; font-weight: bold; font-size: 1.1em; }

.trophy-screen { text-align: center; padding: 25px 15px; }
.trophy-emoji { font-size: 5.5em; display: block; animation: trophyPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
@keyframes trophyPop { from { transform: scale(0) rotate(-10deg); opacity:0; } to { transform: scale(1) rotate(0); opacity:1; } }
.trophy-text { color: #2ed573; font-size: 1.9em; font-weight: bold; margin: 12px 0; text-shadow: 0 0 20px rgba(46,213,115,0.4); animation: fadeInUp 0.5s ease 0.3s both; }

.konfetti-piece { position: fixed; top: -10px; z-index: 999; border-radius: 2px; animation: konfettiFall linear forwards; }
@keyframes konfettiFall { to { transform: translateY(100vh) rotate(720deg); opacity:0; } }

/* VIDEO */
video { width: 100%; border-radius: 12px; border: 2px solid #4a90d9; margin: 12px 0; box-shadow: 0 0 20px rgba(74,144,217,0.3); }

/* FÜF-FINGER-REGEL SORTIER-KARTEN */
.fff-karte {
  display: flex;
  align-items: center;
  gap: 14px;
  background: linear-gradient(135deg, #16213e, #0f3460);
  border: 2px solid #4a90d9;
  border-radius: 10px;
  padding: 14px 16px;
  cursor: grab;
  font-size: 1em;
  transition: all 0.2s ease;
  user-select: none;
}
.fff-karte:hover { border-color: #e8a000; transform: translateX(4px); }
.fff-karte.dragging { opacity: 0.4; }
.fff-karte.over { border-color: #2ed573; box-shadow: 0 0 12px rgba(46,213,115,0.4); transform: scale(1.02); }
.fff-karte.selected { border-color: #e8a000; box-shadow: 0 0 12px rgba(232,160,0,0.5); }
.fff-karte.richtig { border-color: #2ed573; background: linear-gradient(135deg, rgba(46,213,115,0.15), rgba(46,213,115,0.05)); }
.fff-karte.falsch  { border-color: #ff4757; background: linear-gradient(135deg, rgba(255,71,87,0.15), rgba(255,71,87,0.05)); }
.fff-nr {
  background: #e8a000;
  color: #000;
  font-weight: bold;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

/* HYDRAULIK SCHEMA BOXEN */
.hydro-box {
  background: linear-gradient(135deg, #16213e, #0f3460);
  border: 2px solid #4a90d9;
  border-radius: 8px;
  padding: 8px 10px;
  min-width: 65px;
  text-align: center;
  cursor: pointer;
  font-weight: bold;
  font-size: 0.95em;
  color: #e8a000;
  transition: all 0.2s ease;
  user-select: none;
}
.hydro-box:hover { border-color: #e8a000; transform: scale(1.05); }
.hydro-box.richtig { border-color: #2ed573; background: rgba(46,213,115,0.15); color: #2ed573; }
.hydro-box.falsch  { border-color: #ff4757; background: rgba(255,71,87,0.15); color: #ff4757; }
.hydro-arrow { color: #4a90d9; font-size: 1em; }

/* BONUS */
.bonus-box { background: linear-gradient(135deg, rgba(163,103,212,0.15), rgba(163,103,212,0.05)); border: 2px solid #a367d4; border-radius: 12px; padding: 15px; margin: 12px 0; }

/* DRAG AND DROP */
.dragdrop-area { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin: 12px 0; }
.dropzone {
  border: 2px dashed;
  border-radius: 10px;
  padding: 12px 10px;
  min-height: 70px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  transition: all 0.2s ease;
  position: relative;
}
.dropzone .dz-label { font-size: 1em; color: #ccc; margin-bottom: 4px; }
.dropzone .dz-drop { font-size: 0.88em; color: #888; font-style: italic; }
.dropzone.over { transform: scale(1.05); box-shadow: 0 0 15px rgba(232,160,0,0.4); border-style: solid; }
.dropzone.filled { border-style: solid; }
.dropzone.filled .dz-drop { display: none; }
.dropzone.correct { border-color: #2ed573 !important; box-shadow: 0 0 15px rgba(46,213,115,0.4); }
.dropzone.wrong { border-color: #ff4757 !important; box-shadow: 0 0 15px rgba(255,71,87,0.4); animation: shakeSmall 0.4s ease; }
@keyframes shakeSmall { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

.draggable-pool { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; min-height: 44px; }
.draggable {
  background: linear-gradient(135deg, #16213e, #0f3460);
  border: 1px solid #4a90d9;
  border-radius: 8px;
  padding: 11px 18px;
  cursor: grab;
  font-size: 1em;
  transition: all 0.2s ease;
  user-select: none;
}
.draggable:hover { border-color: #e8a000; transform: translateY(-2px); }
.draggable.dragging { opacity: 0.4; }
.draggable.selected { border-color: #e8a000; box-shadow: 0 0 10px rgba(232,160,0,0.5); }
.draggable.placed { display: none; }

.dz-placed-term {
  background: rgba(232,160,0,0.2);
  border: 1px solid #e8a000;
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 0.85em;
  font-weight: bold;
  color: #fff;
}

/* PDF EINBETTUNG */
.pdf-box {
  background: linear-gradient(135deg, rgba(74,144,217,0.08), rgba(74,144,217,0.03));
  border: 2px solid #4a90d9;
  border-radius: 12px;
  padding: 14px;
  margin: 14px 0;
}
.pdf-box-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
  flex-wrap: wrap;
  gap: 8px;
}
.pdf-box-title { font-weight: bold; color: #4a90d9; font-size: 1.1em; }

/* Toggle-Button einheitlich mit dem Rest */
.pdf-toggle-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(135deg, #16213e, #0f3460);
  color: #eaeaea;
  border: 1px solid #4a90d9;
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 0.9em;
  cursor: pointer;
  transition: all 0.2s ease;
  white-space: nowrap;
}
.pdf-toggle-btn:hover {
  border-color: #e8a000;
  color: #e8a000;
  background: linear-gradient(135deg, #0f3460, #1a4a80);
}
.pdf-card-link {
  display: flex;
  align-items: center;
  gap: 16px;
  background: linear-gradient(135deg, #16213e, #0f3460);
  border: 2px solid #4a90d9;
  border-radius: 12px;
  padding: 18px 20px;
  text-decoration: none !important;
  transition: all 0.22s ease;
}
.pdf-card-link:hover {
  border-color: #e8a000;
  background: linear-gradient(135deg, #0f3460, #1a4a80);
  transform: translateX(4px);
  box-shadow: 0 4px 18px rgba(232,160,0,0.2);
}
.pdf-card-icon { font-size: 2.2em; flex-shrink: 0; }
.pdf-card-text { display: flex; flex-direction: column; flex: 1; }
.pdf-card-text strong { color: #fff; font-size: 1.05em; }
.pdf-card-text span { color: #aaa; font-size: 0.85em; margin-top: 2px; }
.pdf-card-arrow { font-size: 1.6em; color: #4a90d9; }
.pdf-open-link {
  display: inline-block;

let fffDragged = null;
let fffSelected = null;

function initFFF() {
  updateFFFNummern();
}

function updateFFFNummern() {
  const karten = document.querySelectorAll('.fff-karte');
  karten.forEach((k, i) => {
    const nr = k.querySelector('.fff-nr');
    if (nr) nr.textContent = i + 1;
  });
}

function fffDragStart(e) {
  fffDragged = e.currentTarget;
  setTimeout(() => fffDragged.classList.add('dragging'), 0);
}

function fffDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.fff-karte').forEach(k => k.classList.remove('over'));
}

function fffDragOver(e) {
  e.preventDefault();
  document.querySelectorAll('.fff-karte').forEach(k => k.classList.remove('over'));
  e.currentTarget.classList.add('over');
}

function fffDrop(e) {
  e.preventDefault();
  const target = e.currentTarget;
  target.classList.remove('over');
  if (!fffDragged || fffDragged === target) return;
  const liste = document.getElementById('fff-liste');
  const karten = [...liste.querySelectorAll('.fff-karte')];
  const fromIdx = karten.indexOf(fffDragged);
  const toIdx = karten.indexOf(target);
  if (fromIdx < toIdx) liste.insertBefore(fffDragged, target.nextSibling);
  else liste.insertBefore(fffDragged, target);
  updateFFFNummern();
  fffDragged = null;
}

// Touch-Support: tippe Karte, dann tippe Ziel
function fffTap(el) {
  if (fffSelected && fffSelected !== el) {
    const liste = document.getElementById('fff-liste');
    const karten = [...liste.querySelectorAll('.fff-karte')];
    const fromIdx = karten.indexOf(fffSelected);
    const toIdx = karten.indexOf(el);
    if (fromIdx < toIdx) liste.insertBefore(fffSelected, el.nextSibling);
    else liste.insertBefore(fffSelected, el);
    fffSelected.classList.remove('selected');
    fffSelected = null;
    updateFFFNummern();
  } else if (fffSelected === el) {
    fffSelected.classList.remove('selected');
    fffSelected = null;
  } else {
    fffSelected = el;
    el.classList.add('selected');
  }
}

function checkGefaehrdungen() {
  const items = document.querySelectorAll('#gefahr-auswahl input[type=checkbox]');
  let alleRichtig = true, fehler = [];
  items.forEach(cb => {
    const sollRichtig = cb.dataset.richtig === 'true';
    const istAngekreuzt = cb.checked;
    if (sollRichtig && !istAngekreuzt) { alleRichtig = false; fehler.push('missing'); }
    if (!sollRichtig && istAngekreuzt) { alleRichtig = false; fehler.push('wrong'); }
  });
  const fb = document.getElementById('gefahr-feedback');
  if (!fb) return;
  if (alleRichtig) {
    sound('r');
    fb.style.display = 'block';
    fb.innerHTML = `<div class="richtig">✅ <strong>Alle 6 Gefährdungen korrekt identifiziert!</strong><br>

    sound('f');

    const hatFehlende = fehler.includes('missing');
    let hinweis = '';

    fb.style.display = 'block';
    fb.innerHTML = `<div class="falsch">❌ <strong>Nicht ganz!</strong> ${hinweis}</div>`;
  }
}

let ctx;
function sound(t){
  try{
    if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);
    if(t==='r'){o.frequency.setValueAtTime(523,ctx.currentTime);o.frequency.setValueAtTime(659,ctx.currentTime+0.1);o.frequency.setValueAtTime(784,ctx.currentTime+0.2);g.gain.setValueAtTime(0.18,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);o.start();o.stop(ctx.currentTime+0.5);}
    else if(t==='f'){o.frequency.setValueAtTime(280,ctx.currentTime);o.frequency.setValueAtTime(180,ctx.currentTime+0.15);g.gain.setValueAtTime(0.18,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);o.start();o.stop(ctx.currentTime+0.4);}
    else if(t==='w'){[523,659,784,1047].forEach((f,i)=>{const o2=ctx.createOscillator(),g2=ctx.createGain();o2.connect(g2);g2.connect(ctx.destination);o2.frequency.value=f;g2.gain.setValueAtTime(0.13,ctx.currentTime+i*0.12);g2.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.12+0.4);o2.start(ctx.currentTime+i*0.12);o2.stop(ctx.currentTime+i*0.12+0.4);});}
  }catch(e){}
}

// DRAG AND DROP LOGIC (mit Touch-Support für Tablets)
// ============================================================
let selectedDraggable = null;

function initDragDrop() {
  const draggables = document.querySelectorAll('.draggable');
  const dropzones = document.querySelectorAll('.dropzone');

  draggables.forEach(d => {
    // Desktop drag events
    d.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', d.dataset.value);
      d.classList.add('dragging');
    });
    d.addEventListener('dragend', () => d.classList.remove('dragging'));

    // Touch/click support (tap to select, tap zone to place)
    d.addEventListener('click', () => {
      if (d.classList.contains('placed')) return;
      draggables.forEach(x => x.classList.remove('selected'));
      if (selectedDraggable === d) {
        selectedDraggable = null;
      } else {
        selectedDraggable = d;
        d.classList.add('selected');
      }
    });
  });

  dropzones.forEach(z => {
    z.addEventListener('dragover', e => { e.preventDefault(); z.classList.add('over'); });
    z.addEventListener('dragleave', () => z.classList.remove('over'));
    z.addEventListener('drop', e => {
      e.preventDefault();
      z.classList.remove('over');
      const value = e.dataTransfer.getData('text/plain');
      placeInZone(z, value);
    });

    // Touch/click support
    z.addEventListener('click', () => {
      if (selectedDraggable) {
        placeInZone(z, selectedDraggable.dataset.value);
        selectedDraggable.classList.remove('selected');
        selectedDraggable = null;
      }
    });
  });
}

function placeInZone(zone, value) {
  // Find the draggable with this value and mark it placed
  const drag = Array.from(document.querySelectorAll('.draggable')).find(d => d.dataset.value === value && !d.classList.contains('placed'));
  if (!drag) return; // already used

  // If zone already filled, return its term to the pool first
  const existingTerm = zone.querySelector('.dz-placed-term');
  if (existingTerm) {
    const oldValue = existingTerm.dataset.value;
    const oldDrag = Array.from(document.querySelectorAll('.draggable')).find(d => d.dataset.value === oldValue);
    if (oldDrag) oldDrag.classList.remove('placed');
    existingTerm.remove();
  }

  drag.classList.add('placed');
  zone.classList.add('filled');
  zone.classList.remove('correct','wrong');
  const term = document.createElement('div');
  term.className = 'dz-placed-term';
  term.dataset.value = value;
  term.textContent = value;
  term.onclick = (e) => {
    e.stopPropagation();
    drag.classList.remove('placed');
    zone.classList.remove('filled');
    term.remove();
  };
  zone.appendChild(term);
}

function checkDragDrop() {
  const zones = document.querySelectorAll('.dropzone');
  let allFilled = true;
  let allCorrect = true;

  zones.forEach(z => {
    const term = z.querySelector('.dz-placed-term');
    if (!term) { allFilled = false; return; }
    const correct = term.dataset.value === z.dataset.answer;
    z.classList.remove('correct','wrong');
    z.classList.add(correct ? 'correct' : 'wrong');
    if (!correct) allCorrect = false;
  });

  if (!allFilled) {
    alert('Bitte ordnet allen Farbfeldern einen Begriff zu!');
    return;
  }

  setTimeout(() => {
    if (allCorrect) { sound('r'); addScore(true); go('f_a2'); }
    else { sound('f'); go('f_a1_falsch'); }
  }, 600);
}

function initHydroSchema() {

function hydroKlick(pos) {
  hydroAktiv = pos;

function hydroBestaetigen() {
  const sel = document.getElementById('hydro-select');
  if (!sel || !sel.value) { alert('Bitte einen Begriff wählen!'); return; }
  const val = sel.value;
  const pos = hydroAktiv;
  // Prüfen ob der Begriff schon woanders verwendet wurde
  const anderePos = Object.keys(hydroZugeordnet).find(k => k !== pos && hydroZugeordnet[k] === val);
  if (anderePos) {
    const lbl = document.getElementById(`lbl-${anderePos}`);
    alert(`„${hydroBezeichnung[val]}" ist schon an anderer Stelle eingetragen. Bitte entferne es dort zuerst oder wähle einen anderen Begriff.`);
    return;
  }
  hydroZugeordnet[pos] = val;
  document.getElementById('hydro-popup').style.display = 'none';
  updateHydroSchema();
}

function updateHydroSchema() {
  const positionen = ['aktor','ventil','manometer','pumpe','motor','filter','tank'];
  let richtig = 0, falsch = 0, gesetzt = 0;

  positionen.forEach(pos => {
    const lbl   = document.getElementById(`lbl-${pos}`);
    const badge = document.getElementById(`badge-${pos}`);
    const hint  = document.getElementById(`hint-${pos}`);
    const wert  = hydroZugeordnet[pos];

    if (wert) {
      gesetzt++;
      // Text setzen
      if (lbl) {
        lbl.textContent = hydroBezeichnung[wert];
        lbl.setAttribute('display', 'block');
        lbl.setAttribute('font-size', '24');
      }
      if (badge) badge.setAttribute('display', 'block');
      if (hint)  hint.setAttribute('display', 'none');

      const istRichtig = wert === hydroLoesung[pos];
      if (istRichtig) {
        richtig++;
        if (badge) badge.setAttribute('stroke', '#2ed573');
        if (lbl)   lbl.setAttribute('fill', '#2ed573');
      } else {
        falsch++;
        if (badge) badge.setAttribute('stroke', '#ff4757');
        if (lbl)   lbl.setAttribute('fill', '#ff4757');
      }
    } else {
      if (lbl)   { lbl.setAttribute('display', 'none'); }
      if (badge) { badge.setAttribute('display', 'none'); }
      if (hint)  { hint.setAttribute('display', 'block'); }
    }
  });

  // Fortschritt
  const prog = document.getElementById('schema-progress');
  if (prog) prog.textContent = `${gesetzt} / 7 zugeordnet`;

  const weiter = document.getElementById('h_a1_weiter');
  const fb = document.getElementById('hydro-feedback');

  if (gesetzt === 7) {
    if (richtig === 7) {
      sound('r'); addScore(true);
      if (fb) { fb.style.display='block'; fb.innerHTML=`<div class="richtig">✅ <strong>Alle 7 Komponenten korrekt zugeordnet!</strong></div>`; }
      if (weiter) { weiter.style.opacity='1'; weiter.style.pointerEvents='auto'; }
    } else {
      sound('f');
      if (fb) { fb.style.display='block'; fb.innerHTML=`<div class="falsch">❌ <strong>${falsch} Zuordnung(en) falsch</strong> – rot markierte Komponenten nochmal anpassen!</div>`; }
      if (weiter) { weiter.style.opacity='0.3'; weiter.style.pointerEvents='none'; }
    }
  } else {
    if (fb) fb.style.display='none';
    if (weiter) { weiter.style.opacity='0.3'; weiter.style.pointerEvents='none'; }
  }
}

// ============================================================
function typeText(elementId, lines, delay=35, lineDelay=600) {
  const el = document.getElementById(elementId);
  if (!el) return;
  el.innerHTML = '';
  let lineIndex = 0;
  let charIndex = 0;
  let currentLineEl = null;

  function nextLine() {
    if (lineIndex >= lines.length) {
      // Alle Zeilen fertig – zeige Weiter-Button
      const btn = document.getElementById('intro-weiter-btn');
      if (btn) { btn.style.display = 'block'; btn.style.animation = 'fadeInUp 0.5s ease'; }
      return;
    }
    const line = lines[lineIndex];
    currentLineEl = document.createElement('div');
    currentLineEl.className = 'ts-line';
    el.appendChild(currentLineEl);
    charIndex = 0;
    typeChar(line);
  }

  function typeChar(line) {
    if (charIndex < line.length) {
      currentLineEl.innerHTML = line.substring(0, charIndex + 1) + '<span class="typing-cursor"></span>';
      charIndex++;
      setTimeout(() => typeChar(line), delay);
    } else {
      currentLineEl.innerHTML = line; // finaler Text ohne Cursor
      lineIndex++;
      setTimeout(nextLine, lineDelay);
    }
  }

  setTimeout(nextLine, 300);
}

  } else {
    // Lösen: Backen nach außen, Kolben nach vorne (rechts)
    if (pbo) { pbo.setAttribute('x1','480'); pbo.setAttribute('y1','430'); pbo.setAttribute('x2','480'); pbo.setAttribute('y2','330'); pbo.setAttribute('stroke','#4a90d9'); pbo.setAttribute('marker-end','url(#arrowBlue)'); }
    if (pbu) { pbu.setAttribute('x1','480'); pbu.setAttribute('y1','870'); pbu.setAttribute('x2','480'); pbu.setAttribute('y2','970'); pbu.setAttribute('stroke','#4a90d9'); pbu.setAttribute('marker-end','url(#arrowBlue)'); }
    if (pk)  { pk.setAttribute('x1','400'); pk.setAttribute('y1','700'); pk.setAttribute('x2','520'); pk.setAttribute('y2','700'); pk.setAttribute('stroke','#4a90d9'); pk.setAttribute('marker-end','url(#arrowBlue)'); }
  }
}

function clickBauteil(bauteil) {
  const data = diagrammAntworten[bauteil];
  if (!data) return;
  const popup = document.getElementById('diagramm-popup');
  const content = document.getElementById('popup-content');
  if (!popup || !content) return;

  // Bereits richtig beantwortet?
  if (diagrammBeantwortet[bauteil] === true) {
    popup.className = 'richtig';
    content.innerHTML = `✅ <strong>Bereits richtig beantwortet!</strong><br>${data.erklaerung}`;
    popup.style.display = 'block';
    popup.scrollIntoView({behavior:'smooth', block:'nearest'});
    return;
  }

  // Highlight clicked bauteil
  document.querySelectorAll('.bauteil').forEach(el => el.style.filter = '');
  document.querySelectorAll(`[data-bauteil="${bauteil}"]`).forEach(el => {
    if (!el.classList.contains('bauteil-click')) el.style.filter = 'brightness(1.5)';
  });

  const btnHTML = data.antworten.map((a, i) =>
    `<button class="btn" style="margin:5px 0;font-size:0.9em;" onclick="antwortBauteil('${bauteil}', ${i})">${String.fromCharCode(65+i)}) ${a}</button>`
  ).join('');

  popup.className = 'hinweis';
  content.innerHTML = `<p style="font-weight:bold;margin-bottom:10px;">${data.frage}</p>${btnHTML}`;
  popup.style.display = 'block';
  popup.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function antwortBauteil(bauteil, index) {
  const data = diagrammAntworten[bauteil];
  const popup = document.getElementById('diagramm-popup');
  const content = document.getElementById('popup-content');
  const richtig = index === data.richtig;

  if (richtig) {
    sound('r');
    diagrammBeantwortet[bauteil] = true;
    popup.className = 'richtig';
    content.innerHTML = `✅ <strong>Richtig!</strong><br>${data.erklaerung}`;
    // Progress-Pill grün
    const pill = document.getElementById('prog-' + bauteil);
    if (pill) { pill.classList.add('done'); pill.textContent = '✅ ' + pill.textContent.replace('⬜ ', ''); }
    updateDiagrammWeiter();
  } else {
    sound('f');
    popup.className = 'falsch';
    content.innerHTML = `❌ <strong>Nicht ganz!</strong> Schaut nochmal ins Video und die Schnittdarstellung.<br>
      <button class="btn" style="margin-top:8px;font-size:0.9em;" onclick="clickBauteil('${bauteil}')">🔄 Nochmal versuchen</button>`;
  }
}

function updateDiagrammWeiter() {
  const alle = Object.keys(diagrammAntworten).every(k => diagrammBeantwortet[k]);
  const btn = document.getElementById('f_a2_weiter');
  if (btn) {
    btn.style.opacity = alle ? '1' : '0.3';
    btn.style.pointerEvents = alle ? 'auto' : 'none';
  }
}

function toggleRegelBtn() {
  const cb = document.getElementById('regelCheck');
  const btn = document.getElementById('regelWeiterBtn');
  if (!cb || !btn) return;
  if (cb.checked) {
    btn.style.opacity = '1';
    btn.style.pointerEvents = 'auto';
  } else {
    btn.style.opacity = '0.3';
    btn.style.pointerEvents = 'none';
  }
}

function checkPw() {
  const input = document.getElementById('pwInput');
  const error = document.getElementById('pwError');
  if (!input) return;
  const val = input.value.trim().toUpperCase();
  if (val === PASSWORT) {
    input.style.borderColor = '#2ed573';
    input.style.boxShadow = '0 0 20px rgba(46,213,115,0.4)';
    setTimeout(() => go('regeln'), 600);
  } else {
    input.classList.add('wrong');
    if (error) error.textContent = '❌ Falsches Passwort. Frag deine Lehrkraft!';
    setTimeout(() => {
      input.classList.remove('wrong');
      input.value = '';
      input.focus();
    }, 1000);
  }
}

// Enter-Taste im Passwortfeld
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const pwInput = document.getElementById('pwInput');
    if (pwInput && document.activeElement === pwInput) checkPw();
  }
});
